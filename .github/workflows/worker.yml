name: CoAIberry Secure Memory Execution Node # bro there is nothing you can do on this repo might as well leave, or visit: coaiberry.pages.dev/idk2

on:
  repository_dispatch:
    types: [launch_worker]

jobs:
  secure-runtime:
    runs-on: ubuntu-latest

    steps:
      - name: Initialize Isolated Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Upgraded to 3.11 to fix the google.api_core warning

      - name: 📦 Inject System Media Dependencies (FFmpeg & FFprobe)
        run: |
          echo "🔧 Updating apt package matrices..."
          sudo apt-get update
          echo "🎬 Installing full FFmpeg software layer natively..."
          sudo apt-get install -y ffmpeg
          echo "✅ Verifying system binary links..."
          ffmpeg -version
          ffprobe -version

      - name: Install Runtime Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests httpx pydantic
          pip install llama-cpp-python --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu

      - name: Mock Kaggle Environment
        run: |
          # Create the directory structure with root privileges
          sudo mkdir -p /kaggle/working
          # Grant full read/write/execute permissions to the runner user
          sudo chmod -R 777 /kaggle
          echo "✅ Kaggle pathing mocked and permissions granted."

      - name: Scrimmage Execute Memory Pipeline
        env:
          # Context parameters passed from Hugging Face
          USER_PROMPT: ${{ github.event.client_payload.prompt }}
          TARGET_USER: ${{ github.event.client_payload.username }}
          CONTACT_PORT: ${{ github.event.client_payload.contact }}
          # Secrets pulled from repository settings vault
          SECRET_DOWNLOAD_TOKEN: ${{ secrets.WORKER_GIT_TOKEN }}
          SECRET_FILE_URL: ${{ secrets.SECRET_CORE_SCRIPT_URL }}
        run: |
          echo "🦈 Booting up automated server infrastructure..."
          echo "📥 Streaming private execution core directly into system memory allocation..."
          
          # 1. Unmask the curl command to fetch and dump metrics transparently to disk
          curl -H "Authorization: token $SECRET_DOWNLOAD_TOKEN" -L "$SECRET_FILE_URL" > live_core.py
          
          # 2. Boot the Python process in an unbuffered background thread to hold it in volatile RAM
          python -u live_core.py &
          PY_PID=$!
          
          # 3. Give the interpreter a brief moment to map the script code, then immediately shred the file
          sleep 1
          rm -f live_core.py
          echo "🛡️ Hard drive payload shredded. Core execution context running strictly in volatile RAM."
          
          # 4. Bind the shell worker to actively monitor the process and capture the exit signal
          wait $PY_PID
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Execution routine completed successfully."
          else
            echo "❌ Memory pipeline terminated with an error code: $EXIT_CODE"
            exit $EXIT_CODE
          fi

      # =========================================================================
      # 🗑️ THE TERMINATION GUARD (Ensures total deletion if anything touched disk)
      # =========================================================================
      - name: Post-Execution Workspace Purge
        if: always() # This forces the step to run even if your python script crashes!
        run: |
          echo "🧹 Purging runner workspace directory layers..."
          rm -rf ${{ github.workspace }}/*
          echo "💀 Workspace destroyed. Server instance shutting down."
